services:
  - type: web
    name: neevachi-api
    env: node
    buildCommand: cd api && npm install
    startCommand: cd api && npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 5000
      - key: CORS_ORIGIN
        value: https://neevachi-solutions.vercel.app
