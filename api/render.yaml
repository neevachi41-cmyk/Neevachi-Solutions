services:
  - type: web
    name: neevachi-backend
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://neevachi-solutions.vercel.app
      - key: PORT
        value: 10000
